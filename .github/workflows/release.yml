name: Release

on:
    push:
        tags:
            - "v*.*.*"

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "18"
                  registry-url: "https://registry.npmjs.org"

            - name: Install dependencies
              run: make install

            - name: Build
              run: make build

            - name: Publish to npm
              run: |
                  if [[ "${{ github.ref }}" =~ -rc\.[0-9]+$ ]]; then
                    make publish-rc
                  else
                    make publish
                  fi
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
